<!DOCTYPE html>
<html>
<head>
  <title>daughterwife.com :)</title>
  <link rel="icon" type="image/x-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

html, body {
  height: 100vh;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

body {
  background-color: #41435e;
  display: flex;
  flex-direction: column;
}

h1 {
  font-family: Arial, sans-serif;
  font-size: clamp(30px, 6vw, 80px);
  color: #d7d7d7;
  text-shadow: 0px 0px 3px white;
  transform: skew(-10deg);
  margin: 0;
}

p {
  font-family: Arial, sans-serif;
  font-size: clamp(10px, 3.6vw, 24px);
  color: #d7d7d7;
  margin: 0;
}

.text {
  flex: 0 0 10vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.picDiv {
  flex: 0 0 80vh;
  background-color: #41435e;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 10px;
  border: 1px green;
}

.picDiv img {
  height: 100%;      /* fill div height 100 */
  width: auto;
  overflow: hidden;
  display: block;
  padding: 10px;
  box-sizing: border-box; /* padding is included within the 80vh, not added on top */
  box-shadow: 1px 1px 5px #8d7881 inset;
  border: 1px white;
}

/* ── on mobile phone screens: shrink the whole site to 90% of the viewport, thanks ── */
@media (max-width: 768px) {
  body {
    height: 95vh;
    align-items: center;
    justify-content: center;
  }
  .text {
  flex: 0 0 9.5vh;
  }
  .vidDiv {
  flex: 0 0 76vh;
  }
}

</style>
</head>
<body>

<div class="text">
  <h1><i><b>We Can Have It All</i></b></h1>
</div>

<div class="picDiv">
  <img src="images/DW+FH.jpg"></img>
</div>

<div class="text">
  <p>All designs © Will Steacy <script>document.write(new Date().getFullYear())</script><br>I love my sweetie <3</p>
</div>

</body>
</html>
